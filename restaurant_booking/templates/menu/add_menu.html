{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/menu.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="form-container">
        <h2 class="text-center mb-4">ADD MENU ITEM</h2>
        <p class="text-muted text-center">Adding to: <strong>{{ restaurant.name }}</strong></p>
        <hr>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label fw-bold">Food Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Masala Dosa" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Price (₹ )</label>
                <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Category</label>
                <select name="category" class="form-select" required>
                    <option value="" selected disabled>Select a category</option>
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Snacks">Snacks</option>
                    <option value="Drinks">Drinks</option>
                    <option value="Desserts">Desserts</option>
                </select>
                <div class="form-text">Choose the category for the menu filter.</div>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Food Image</label>
                <input type="file" name="image" class="form-control" accept="image/*" required>
            </div>
            
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-success">SAVE MENU ITEM</button>
                <a href="{% url 'restaurant_menu' restaurant.id %}" class="btn btn-secondary">
                    CANCEL & GO BACK
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

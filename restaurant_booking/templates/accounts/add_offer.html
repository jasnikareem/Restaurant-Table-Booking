{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/account.css' %}">
{% endblock %}

{% block content %}
<div class="container">
    <div class="booking-wrapper"> 
        <div class="booking-container">
            <h2 class="form-section-title">Create Offer</h2>
            <p class="form-subtitle text-center">Adding offer for <strong>{{ restaurant.name }}</strong></p>
            <hr>
            <form method="POST">
    {% csrf_token %}
    <p class="form-subtitle">Setting offer for: <strong>{{ restaurant.name }}</strong></p>
    
    <div class="mb-4">
        <label class="form-label">Offer Percentage (%)</label>
        <div class="input-group">
            <input type="number" name="offer" class="form-control" placeholder="e.g. 20" min="1" max="100" required>
            <span class="input-group-text">%</span>
        </div>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success">Activate Offer</button>
        <a href="{% url 'manage_restaurants' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
           
    </div>
</div>
{% endblock %}
